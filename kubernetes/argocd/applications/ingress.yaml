apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudops-ingress
  namespace: production
spec:
  rules:
  # Frontend on root path
  - host: "*"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
      # Backend API on /api path
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
