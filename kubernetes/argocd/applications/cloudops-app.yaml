apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudops-intelligence
  namespace: argocd
spec:
  # Git source of truth
  source:
    repoURL: https://github.com/ayushmehara/cloudops-intelligence.git
    targetRevision: main
    path: kubernetes/argocd/applications
  
  # Deployment target
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  
  # Sync strategy
  syncPolicy:
    automated:
      prune: true        # Delete resources not in git
      selfHeal: true     # Automatically fix drift
      allowEmpty: false  # Prevent accidental deletion of all
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Notifications
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas

---
# ArgoCD Application for monitoring stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudops-monitoring
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/ayushmehara/cloudops-intelligence.git
    targetRevision: main
    path: kubernetes/monitoring
  
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
