---
# Production namespace limit range (FIXED)
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
spec:
  limits:
    # Per container limits (where default/defaultRequest work)
    - type: Container
      max:
        cpu: "1"
        memory: "512Mi"
      min:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "256m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
    
    # Pod max/min (no default/defaultRequest)
    - type: Pod
      max:
        cpu: "2"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "64Mi"

