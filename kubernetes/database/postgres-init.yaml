---
# Job to initialize PostgreSQL database
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: production
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: postgres-init
    spec:
      restartPolicy: Never
      containers:
      - name: postgres-init
        image: postgres:15-alpine
        command:
        - /bin/sh
        - -c
        - |
          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h postgres -U cloudops -d postgres; do
            echo "PostgreSQL is unavailable, sleeping..."
            sleep 2
          done
          
          echo "PostgreSQL is up!"
          
          # Create database if not exists
          PGPASSWORD=cloudops123 psql -h postgres -U cloudops -d postgres -c "CREATE DATABASE cloudops_db;"
          
          # Create tables
          PGPASSWORD=cloudops123 psql -h postgres -U cloudops -d cloudops_db << 'EOF'
          
          -- Users table
          CREATE TABLE IF NOT EXISTS users (
            id VARCHAR PRIMARY KEY,
            email VARCHAR UNIQUE NOT NULL,
            username VARCHAR UNIQUE NOT NULL,
            password_hash VARCHAR NOT NULL,
            full_name VARCHAR,
            is_active BOOLEAN DEFAULT true,
            is_admin BOOLEAN DEFAULT false,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          
          -- Deployments table
          CREATE TABLE IF NOT EXISTS deployments (
            id VARCHAR PRIMARY KEY,
            name VARCHAR NOT NULL,
            application VARCHAR NOT NULL,
            environment VARCHAR NOT NULL,
            version VARCHAR NOT NULL,
            image VARCHAR NOT NULL,
            status VARCHAR DEFAULT 'pending',
            duration_seconds INTEGER,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            completed_at TIMESTAMP,
            created_by VARCHAR,
            git_commit VARCHAR,
            git_branch VARCHAR,
            rollback_from VARCHAR,
            metadata JSONB,
            FOREIGN KEY (created_by) REFERENCES users(id),
            FOREIGN KEY (rollback_from) REFERENCES deployments(id)
          );
          
          -- Incidents table
          CREATE TABLE IF NOT EXISTS incidents (
            id VARCHAR PRIMARY KEY,
            title VARCHAR NOT NULL,
            description TEXT,
            severity VARCHAR,
            status VARCHAR DEFAULT 'open',
            service VARCHAR NOT NULL,
            related_deployment_id VARCHAR,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            resolved_at TIMESTAMP,
            created_by VARCHAR,
            ai_analysis TEXT,
            ai_suggested_action TEXT,
            metrics JSONB,
            logs JSONB,
            FOREIGN KEY (created_by) REFERENCES users(id),
            FOREIGN KEY (related_deployment_id) REFERENCES deployments(id)
          );
          
          -- Metrics table
          CREATE TABLE IF NOT EXISTS metrics (
            id VARCHAR PRIMARY KEY,
            name VARCHAR NOT NULL,
            service VARCHAR NOT NULL,
            value FLOAT NOT NULL,
            labels JSONB,
            timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          
          -- Configurations table
          CREATE TABLE IF NOT EXISTS configurations (
            id VARCHAR PRIMARY KEY,
            key VARCHAR UNIQUE NOT NULL,
            value VARCHAR NOT NULL,
            description VARCHAR,
            is_secret BOOLEAN DEFAULT false,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          
          -- Create indexes
          CREATE INDEX IF NOT EXISTS idx_deployments_app_env ON deployments(application, environment);
          CREATE INDEX IF NOT EXISTS idx_deployments_created_at ON deployments(created_at DESC);
          CREATE INDEX IF NOT EXISTS idx_incidents_service ON incidents(service);
          CREATE INDEX IF NOT EXISTS idx_incidents_status ON incidents(status);
          CREATE INDEX IF NOT EXISTS idx_incidents_created_at ON incidents(created_at DESC);
          CREATE INDEX IF NOT EXISTS idx_metrics_name_service ON metrics(name, service);
          CREATE INDEX IF NOT EXISTS idx_metrics_timestamp ON metrics(timestamp DESC);
          
          EOF
          
          echo "Database initialization complete!"
        env:
        - name: PGPASSWORD
          value: "cloudops123"
