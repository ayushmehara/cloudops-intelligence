---
# Storage class for persistent volumes
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  namespace: default
provisioner: rancher.io/local-path
allowVolumeExpansion: true
parameters:
  # k3s local-path provisioner uses /var/lib/rancher/k3s/storage
  #nodes: "node1,node2"  # Specify which nodes can use this
reclaimPolicy: Retain  # Keep data even after PVC deletion
volumeBindingMode: WaitForFirstConsumer  # Bind when pod created
